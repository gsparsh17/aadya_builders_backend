version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: 99acres-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: 99acres
    volumes:
      - mongodb_data:/data/db
    networks:
      - 99acres-network

  redis:
    image: redis:7.2-alpine
    container_name: 99acres-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    networks:
      - 99acres-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: 99acres-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - 99acres-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: 99acres-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - 99acres-network

volumes:
  mongodb_data:
  redis_data:
  elasticsearch_data:

networks:
  99acres-network:
    driver: bridge